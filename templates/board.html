<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Draft Board 2026</title>
    <link rel="stylesheet" href="/static/css/vintage-theme.css">
    <style>
        body {
            background: var(--cream);
            margin: 0;
            padding: 0;
        }

        /* ---- Board Header ---- */
        .board-header {
            background: var(--navy);
            color: var(--cream);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--mustard);
        }

        .board-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.04em;
            color: var(--cream);
        }

        .board-title span { color: var(--mustard); }

        .board-status {
            text-align: right;
            font-family: var(--font-mono);
            font-size: 0.75rem;
        }

        .board-status .pick-count {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--mustard);
            font-family: var(--font-display);
        }

        .board-status .refresh-note {
            color: rgba(255,255,255,0.4);
            font-size: 0.6rem;
            margin-top: 2px;
        }

        .connection-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-right: 5px;
            background: var(--forest-light);
            box-shadow: 0 0 4px rgba(61, 107, 32, 0.5);
        }

        .connection-dot.disconnected {
            background: var(--burgundy);
            box-shadow: 0 0 4px rgba(139, 26, 26, 0.5);
        }

        /* ---- Draft Ticker ---- */
        .draft-ticker {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            color: var(--cream);
            padding: 8px 24px;
            border-bottom: 1px solid rgba(200, 169, 81, 0.25);
        }

        .ticker-label {
            font-family: var(--font-display);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--mustard);
            margin-bottom: 5px;
        }

        .ticker-items {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: thin;
        }

        .ticker-item {
            flex-shrink: 0;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            border-left: 2px solid var(--mustard);
        }

        .ticker-item .pick-num {
            color: var(--mustard);
            font-weight: 700;
        }

        .ticker-item .pick-price {
            color: var(--forest-light);
            font-weight: 600;
        }

        .ticker-item .pick-pos {
            color: rgba(255,255,255,0.4);
            font-size: 0.6rem;
        }

        .ticker-empty {
            color: rgba(255,255,255,0.3);
            font-style: italic;
            font-size: 0.72rem;
            font-family: var(--font-body);
        }

        .ticker-item.new-pick {
            animation: flashPick 2.5s ease-out;
        }

        @keyframes flashPick {
            0% { background: rgba(200, 169, 81, 0.4); }
            100% { background: rgba(255,255,255,0.05); }
        }

        /* ---- Teams Grid — mirrors dashboard team-view-grid ---- */
        .board-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 14px;
            padding: 16px 20px;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* ---- New-draft highlight on roster slots ---- */
        .roster-slot.new-draft-slot {
            animation: highlightSlot 3.5s ease-out;
        }

        @keyframes highlightSlot {
            0% { background: rgba(200, 169, 81, 0.3); }
            100% { background: transparent; }
        }

        /* ---- Footer ---- */
        .board-footer {
            text-align: center;
            padding: 16px;
            font-family: var(--font-body);
            font-size: 0.65rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-light);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="board-header">
        <div class="board-title">IPL <span>Draft Board</span> 2026</div>
        <div class="board-status">
            <div class="pick-count" id="pick-count">0 picks</div>
            <div><span class="connection-dot" id="connection-dot"></span><span id="connection-text">Connected</span></div>
            <div class="refresh-note">Live — refreshes every 5 seconds</div>
        </div>
    </div>

    <div class="draft-ticker">
        <div class="ticker-label">Recent Picks</div>
        <div class="ticker-items" id="ticker-items">
            <span class="ticker-empty">Waiting for the draft to begin...</span>
        </div>
    </div>

    <div class="board-grid" id="board-grid"></div>

    <div class="board-footer">
        Illini Penal League · Est. 2001
    </div>

    <script>
        let boardState = null;
        let lastPickCount = 0;
        let lastNewPlayer = null; // track the most recently drafted player for highlight

        // Same roster slot order as the main dashboard
        const ROSTER_SLOT_ORDER = [
            { pos: 'C',    count: 1, type: 'hitting' },
            { pos: '1B',   count: 1, type: 'hitting' },
            { pos: '2B',   count: 1, type: 'hitting' },
            { pos: 'SS',   count: 1, type: 'hitting' },
            { pos: '3B',   count: 1, type: 'hitting' },
            { pos: 'CI',   count: 1, type: 'hitting' },
            { pos: 'MI',   count: 1, type: 'hitting' },
            { pos: 'OF',   count: 5, type: 'hitting' },
            { pos: 'UTIL', count: 1, type: 'hitting' },
            { pos: 'SP',   count: 4, type: 'pitching' },
            { pos: 'RP',   count: 3, type: 'pitching' },
            { pos: 'P',    count: 2, type: 'pitching' },
        ];

        const flexMap = {
            'CI':   ['1B', '3B'],
            'MI':   ['2B', 'SS'],
            'P':    ['SP', 'RP'],
            'UTIL': ['C', '1B', '2B', 'SS', '3B', 'OF', 'CI', 'MI'],
        };

        // ---- Data fetching ----
        async function fetchBoardState() {
            try {
                const res = await fetch('/api/board_state');
                boardState = await res.json();
                renderBoard();
                setConnected(true);
            } catch (err) {
                console.error('Fetch failed:', err);
                setConnected(false);
            }
        }

        function setConnected(ok) {
            const dot = document.getElementById('connection-dot');
            const txt = document.getElementById('connection-text');
            dot.className = ok ? 'connection-dot' : 'connection-dot disconnected';
            txt.textContent = ok ? 'Connected' : 'Reconnecting...';
        }

        // ---- Main render ----
        function renderBoard() {
            if (!boardState) return;
            const picks = boardState.draft_log.length;
            const hasNew = picks > lastPickCount;

            // Figure out which player was just drafted (for highlight)
            if (hasNew && boardState.draft_log.length > 0) {
                const newest = boardState.draft_log[boardState.draft_log.length - 1];
                lastNewPlayer = newest.player;
            } else {
                lastNewPlayer = null;
            }

            document.getElementById('pick-count').textContent =
                `${picks} pick${picks !== 1 ? 's' : ''}`;

            renderTicker(hasNew);
            renderTeams();

            lastPickCount = picks;
        }

        // ---- Ticker ----
        function renderTicker(hasNew) {
            const el = document.getElementById('ticker-items');
            const log = boardState.draft_log;

            if (log.length === 0) {
                el.innerHTML = '<span class="ticker-empty">Waiting for the draft to begin...</span>';
                return;
            }

            const recent = log.slice(-20).reverse();
            el.innerHTML = recent.map((pick, i) => {
                const num = log.length - i;
                return `<div class="ticker-item ${hasNew && i === 0 ? 'new-pick' : ''}">
                    <span class="pick-num">#${num}</span>
                    ${esc(pick.player)}
                    <span class="pick-pos">${esc(pick.position)}</span>
                    → ${esc(pick.manager)}
                    <span class="pick-price">$${pick.price}</span>
                </div>`;
            }).join('');
        }

        // ---- Teams ----
        function renderTeams() {
            const el = document.getElementById('board-grid');
            // Sort: highest budget first
            const teams = [...boardState.teams].sort((a, b) => b.budget_remaining - a.budget_remaining);
            el.innerHTML = teams.map(t => renderTeamCard(t)).join('');
        }

        function renderTeamCard(team) {
            // Merge keepers and drafted into a single list
            const keepers = (team.keepers || []).map(k => ({
                player: k.player, position: k.position, price: k.price, source: 'keeper',
            }));
            const drafted = (team.drafted_players || []).map(d => ({
                player: d.player, position: d.position, price: d.price, source: 'drafted',
            }));
            const allPlayers = [...keepers, ...drafted];

            // Fill slots using same logic as dashboard
            const filledSlots = fillRosterSlots(allPlayers);

            let hittingRows = '';
            let pitchingRows = '';
            for (const slot of filledSlots) {
                const row = renderSlotRow(slot);
                if (slot.type === 'hitting') hittingRows += row;
                else pitchingRows += row;
            }

            const spotsLeft = team.spots_remaining;

            return `
                <div class="team-roster-card">
                    <div class="team-roster-header">
                        <div class="team-roster-name">${esc(team.manager)}</div>
                        <div class="team-roster-budget">
                            <div class="budget-big">$${team.budget_remaining}</div>
                            <div class="budget-detail">${spotsLeft} spot${spotsLeft !== 1 ? 's' : ''} left</div>
                        </div>
                    </div>
                    <div class="team-roster-body">
                        <div class="roster-section-header">Hitting</div>
                        ${hittingRows}
                        <div class="roster-section-header">Pitching</div>
                        ${pitchingRows}
                    </div>
                </div>
            `;
        }

        // ---- Roster Slot Logic (mirrors dashboard.js fillRosterSlots) ----
        function fillRosterSlots(players) {
            const slots = [];
            for (const def of ROSTER_SLOT_ORDER) {
                for (let i = 0; i < def.count; i++) {
                    slots.push({ pos: def.pos, type: def.type, player: null, price: null, source: null });
                }
            }

            const unassigned = [...players];

            // Pass 1: exact position match
            for (const slot of slots) {
                if (slot.player) continue;
                const idx = unassigned.findIndex(p => p.position === slot.pos);
                if (idx !== -1) {
                    const p = unassigned.splice(idx, 1)[0];
                    Object.assign(slot, { player: p.player, price: p.price, source: p.source });
                }
            }

            // Pass 2: flex mapping
            for (const slot of slots) {
                if (slot.player) continue;
                const eligible = flexMap[slot.pos] || [];
                if (!eligible.length) continue;
                const idx = unassigned.findIndex(p => eligible.includes(p.position));
                if (idx !== -1) {
                    const p = unassigned.splice(idx, 1)[0];
                    Object.assign(slot, { player: p.player, price: p.price, source: p.source });
                }
            }

            // Pass 3: overflow — put remaining in any empty slot of matching type
            for (const p of unassigned) {
                const pType = ['SP', 'RP', 'P'].includes(p.position) ? 'pitching' : 'hitting';
                const empty = slots.find(s => !s.player && s.type === pType);
                if (empty) {
                    Object.assign(empty, { player: p.player, price: p.price, source: p.source });
                }
            }

            return slots;
        }

        function renderSlotRow(slot) {
            const posClass = slot.type === 'hitting' ? 'pos-hitting' : 'pos-pitching';

            if (!slot.player) {
                return `
                    <div class="roster-slot">
                        <span class="roster-slot-pos ${posClass}">${slot.pos}</span>
                        <span class="roster-slot-player empty-slot">—</span>
                        <span class="roster-slot-price"></span>
                    </div>`;
            }

            const sourceClass = slot.source === 'keeper' ? 'source-keeper' : 'source-drafted';
            const sourceLabel = slot.source === 'keeper' ? 'K' : 'D';
            const isNew = lastNewPlayer === slot.player;

            return `
                <div class="roster-slot ${isNew ? 'new-draft-slot' : ''}">
                    <span class="roster-slot-pos ${posClass}">${slot.pos}</span>
                    <span class="roster-slot-player">${esc(slot.player)}</span>
                    <span class="roster-slot-source ${sourceClass}">${sourceLabel}</span>
                    <span class="roster-slot-price">$${slot.price}</span>
                </div>`;
        }

        // ---- Utility ----
        function esc(str) {
            if (!str) return '';
            const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
            return String(str).replace(/[&<>"']/g, c => m[c]);
        }

        // ---- Init ----
        fetchBoardState();
        setInterval(fetchBoardState, 5000);
    </script>
</body>
</html>
