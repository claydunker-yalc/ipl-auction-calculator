<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Draft Board 2026</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <link rel="stylesheet" href="/static/css/vintage-theme.css">
    <style>
        body {
            background: var(--cream);
            margin: 0;
            padding: 0;
        }

        /* ---- Board Header ---- */
        .board-header {
            background: var(--navy);
            color: var(--cream);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--mustard);
        }

        .board-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.04em;
            color: var(--cream);
        }

        .board-title span { color: var(--mustard); }

        .board-status {
            text-align: right;
            font-family: var(--font-mono);
            font-size: 0.75rem;
        }

        .board-status .pick-count {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--mustard);
            font-family: var(--font-display);
        }

        .board-status .refresh-note {
            color: rgba(255,255,255,0.4);
            font-size: 0.6rem;
            margin-top: 2px;
        }

        .connection-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-right: 5px;
            background: var(--forest-light);
            box-shadow: 0 0 4px rgba(61, 107, 32, 0.5);
        }

        .connection-dot.disconnected {
            background: var(--burgundy);
            box-shadow: 0 0 4px rgba(139, 26, 26, 0.5);
        }

        /* ---- Draft Ticker ---- */
        .draft-ticker {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            color: var(--cream);
            padding: 8px 24px;
            border-bottom: 1px solid rgba(200, 169, 81, 0.25);
        }

        .ticker-label {
            font-family: var(--font-display);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--mustard);
            margin-bottom: 5px;
        }

        .ticker-items {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: thin;
        }

        .ticker-item {
            flex-shrink: 0;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            border-left: 2px solid var(--mustard);
        }

        .ticker-item .pick-num { color: var(--mustard); font-weight: 700; }
        .ticker-item .pick-price { color: var(--forest-light); font-weight: 600; }
        .ticker-item .pick-pos { color: rgba(255,255,255,0.4); font-size: 0.6rem; }

        .ticker-empty {
            color: rgba(255,255,255,0.3);
            font-style: italic;
            font-size: 0.72rem;
            font-family: var(--font-body);
        }

        .ticker-item.new-pick {
            animation: flashPick 2.5s ease-out;
        }

        @keyframes flashPick {
            0% { background: rgba(200, 169, 81, 0.4); }
            100% { background: rgba(255,255,255,0.05); }
        }

        /* ---- Spreadsheet Board ---- */
        .spreadsheet-wrap {
            overflow-x: auto;
            padding: 12px 0 0;
            -webkit-overflow-scrolling: touch;
        }

        .spreadsheet {
            display: grid;
            /* 1 label column + N team columns */
            min-width: 100%;
            border-collapse: collapse;
            font-family: var(--font-body);
            font-size: 0.78rem;
        }

        /* Column header row: team names */
        .ss-header-row {
            display: contents;
        }

        /* Position label column */
        .ss-pos-label {
            position: sticky;
            left: 0;
            z-index: 10;
            background: #1B2A4A;
            color: var(--cream);
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            text-align: center;
            padding: 3px 6px;
            border-right: 2px solid var(--mustard);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            min-width: 42px;
            white-space: nowrap;
            /* Prevent bleed-through on sticky overlap */
            box-shadow: 4px 0 0 0 #1B2A4A;
        }

        .ss-pos-label.section-hitting {
            background: #2C3E6B;
            color: var(--mustard);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            box-shadow: 4px 0 0 0 #2C3E6B;
        }

        .ss-pos-label.section-pitching {
            background: #6B0F0F;
            color: var(--mustard);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            box-shadow: 4px 0 0 0 #6B0F0F;
        }

        /* Team column header */
        .ss-team-header {
            background: var(--navy);
            color: var(--cream);
            text-align: center;
            padding: 8px 4px 6px;
            border-bottom: 2px solid var(--mustard);
            border-right: 1px solid rgba(255,255,255,0.08);
            min-width: 140px;
        }

        .ss-team-name {
            font-family: var(--font-display);
            font-size: 0.82rem;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ss-team-budget {
            font-family: var(--font-mono);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--mustard);
            margin-top: 2px;
        }

        .ss-team-spots {
            font-family: var(--font-mono);
            font-size: 0.58rem;
            color: rgba(255,255,255,0.5);
            margin-top: 1px;
        }

        .ss-team-maxbid {
            font-family: var(--font-mono);
            font-size: 0.58rem;
            color: rgba(255,255,255,0.35);
        }

        /* Section divider row */
        .ss-section-cell {
            padding: 2px 4px;
            border-right: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }

        .ss-section-cell.hitting-section {
            background: rgba(27, 42, 74, 0.35);
            border-bottom: 1px solid rgba(27, 42, 74, 0.5);
        }

        .ss-section-cell.pitching-section {
            background: rgba(139, 26, 26, 0.35);
            border-bottom: 1px solid rgba(139, 26, 26, 0.5);
        }

        /* Regular player cells */
        .ss-cell {
            padding: 3px 6px;
            border-right: 1px solid var(--border-light);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 140px;
            transition: background 0.2s;
        }

        /* Row banding — consistent color across entire row */
        .ss-cell.row-even { background: var(--parchment); }
        .ss-cell.row-odd  { background: var(--cream-dark); }

        .ss-cell.empty-cell {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.7rem;
        }

        /* Right-side position label */
        .ss-pos-label-right {
            position: sticky;
            right: 0;
            z-index: 10;
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            text-align: center;
            padding: 3px 6px;
            border-left: 2px solid var(--mustard);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            min-width: 42px;
            white-space: nowrap;
            /* Prevent bleed-through on sticky overlap */
            box-shadow: -4px 0 0 0 var(--navy);
        }

        .ss-pos-label-right.row-even { background: #1B2A4A; color: var(--cream); box-shadow: -4px 0 0 0 #1B2A4A; }
        .ss-pos-label-right.row-odd  { background: #2C3E6B; color: var(--cream); box-shadow: -4px 0 0 0 #2C3E6B; }

        .ss-pos-label-right.section-hitting {
            background: #2C3E6B;
            color: var(--mustard);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            box-shadow: -4px 0 0 0 #2C3E6B;
        }

        .ss-pos-label-right.section-pitching {
            background: #6B0F0F;
            color: var(--mustard);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            box-shadow: -4px 0 0 0 #6B0F0F;
        }

        /* Right corner (top-right) */
        .ss-corner-right {
            position: sticky;
            right: 0;
            z-index: 20;
            background: #1B2A4A;
            border-left: 2px solid var(--mustard);
            border-bottom: 2px solid var(--mustard);
            min-width: 42px;
            box-shadow: -4px 0 0 0 #1B2A4A;
        }

        /* Row-based banding on left labels too */
        .ss-pos-label.row-even { background: #1B2A4A; box-shadow: 4px 0 0 0 #1B2A4A; }
        .ss-pos-label.row-odd  { background: #2C3E6B; box-shadow: 4px 0 0 0 #2C3E6B; }

        .ss-cell .player-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.76rem;
        }

        .ss-cell .player-price {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.72rem;
            float: right;
            margin-left: 8px;
        }

        .ss-cell .player-price.price-keeper {
            color: var(--forest);
        }

        .ss-cell .player-price.price-drafted {
            color: var(--navy);
        }

        .ss-cell .source-tag {
            font-family: var(--font-mono);
            font-size: 0.55rem;
            font-weight: 700;
            padding: 0 3px;
            border-radius: 2px;
            margin-right: 3px;
            vertical-align: middle;
        }

        .ss-cell .source-tag.tag-keeper {
            background: var(--forest);
            color: white;
        }

        .ss-cell .source-tag.tag-drafted {
            background: var(--navy);
            color: white;
        }

        /* Row hover */
        .ss-row:hover .ss-cell {
            background: rgba(200, 169, 81, 0.08);
        }

        /* New draft highlight */
        .ss-cell.new-draft-cell {
            animation: highlightCell 3.5s ease-out;
        }

        @keyframes highlightCell {
            0% { background: rgba(200, 169, 81, 0.35); }
            100% { background: inherit; }
        }

        /* Corner cell (top-left) */
        .ss-corner {
            position: sticky;
            left: 0;
            z-index: 20;
            background: #1B2A4A;
            border-right: 2px solid var(--mustard);
            border-bottom: 2px solid var(--mustard);
            min-width: 42px;
            box-shadow: 4px 0 0 0 #1B2A4A;
        }

        /* ---- Footer ---- */
        .board-footer {
            text-align: center;
            padding: 16px;
            font-family: var(--font-body);
            font-size: 0.65rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-light);
            margin-top: 8px;
        }

        /* ---- Responsive tweaks ---- */
        @media (max-width: 768px) {
            .ss-cell, .ss-team-header { min-width: 120px; }
            .ss-cell .player-name { font-size: 0.7rem; }
            .board-header { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="board-header">
        <div class="board-title">IPL <span>Draft Board</span> 2026</div>
        <div class="board-status">
            <div class="pick-count" id="pick-count">0 picks</div>
            <div><span class="connection-dot" id="connection-dot"></span><span id="connection-text">Connected</span></div>
            <div class="refresh-note" id="board-status-note">Live — refreshes every 5 seconds</div>
        </div>
    </div>

    <div class="draft-ticker">
        <div class="ticker-label">Recent Picks</div>
        <div class="ticker-items" id="ticker-items">
            <span class="ticker-empty">Waiting for the draft to begin...</span>
        </div>
    </div>

    <div class="spreadsheet-wrap">
        <div class="spreadsheet" id="spreadsheet"></div>
    </div>

    <div class="board-footer">
        Illini Penal League · Est. 2001
    </div>

    <script>
        let boardState = null;
        let lastPickCount = 0;
        let lastNewPlayer = null;

        // Roster slot definitions — same order as dashboard
        const ROSTER_SLOTS = [
            { pos: 'C',    type: 'hitting' },
            { pos: '1B',   type: 'hitting' },
            { pos: '2B',   type: 'hitting' },
            { pos: 'SS',   type: 'hitting' },
            { pos: '3B',   type: 'hitting' },
            { pos: 'CI',   type: 'hitting' },
            { pos: 'MI',   type: 'hitting' },
            { pos: 'OF',   type: 'hitting' },
            { pos: 'OF',   type: 'hitting' },
            { pos: 'OF',   type: 'hitting' },
            { pos: 'OF',   type: 'hitting' },
            { pos: 'OF',   type: 'hitting' },
            { pos: 'UTIL', type: 'hitting' },
            { pos: 'SP',   type: 'pitching' },
            { pos: 'SP',   type: 'pitching' },
            { pos: 'SP',   type: 'pitching' },
            { pos: 'SP',   type: 'pitching' },
            { pos: 'RP',   type: 'pitching' },
            { pos: 'RP',   type: 'pitching' },
            { pos: 'RP',   type: 'pitching' },
            { pos: 'P',    type: 'pitching' },
            { pos: 'P',    type: 'pitching' },
        ];

        const flexMap = {
            'CI':   ['1B', '3B'],
            'MI':   ['2B', 'SS'],
            'P':    ['SP', 'RP'],
            'UTIL': ['C', '1B', '2B', 'SS', '3B', 'OF', 'CI', 'MI'],
        };

        // ---- Data fetching ----
        async function fetchBoardState() {
            try {
                const res = await fetch('/api/board_state');
                boardState = await res.json();
                renderBoard();
                setConnected(true);
            } catch (err) {
                console.error('Fetch failed:', err);
                setConnected(false);
            }
        }

        function setConnected(ok) {
            const dot = document.getElementById('connection-dot');
            const txt = document.getElementById('connection-text');
            dot.className = ok ? 'connection-dot' : 'connection-dot disconnected';
            txt.textContent = ok ? 'Connected' : 'Reconnecting...';
        }

        // ---- Main render ----
        function renderBoard() {
            if (!boardState) return;
            const picks = boardState.draft_log.length;
            const hasNew = picks > lastPickCount;

            if (hasNew && boardState.draft_log.length > 0) {
                const newest = boardState.draft_log[boardState.draft_log.length - 1];
                lastNewPlayer = newest.player;
            } else {
                lastNewPlayer = null;
            }

            document.getElementById('pick-count').textContent =
                `${picks} pick${picks !== 1 ? 's' : ''}`;

            // Show draft status
            const statusNote = document.getElementById('board-status-note');
            if (boardState.draft_active) {
                statusNote.textContent = 'Live — refreshes every 5 seconds';
                statusNote.style.color = '';
            } else {
                statusNote.textContent = 'Draft has not started yet';
                statusNote.style.color = 'rgba(255,255,255,0.35)';
            }

            renderTicker(hasNew);
            renderSpreadsheet();

            lastPickCount = picks;
        }

        // ---- Ticker ----
        function renderTicker(hasNew) {
            const el = document.getElementById('ticker-items');
            const log = boardState.draft_log;

            if (log.length === 0) {
                el.innerHTML = '<span class="ticker-empty">Waiting for the draft to begin...</span>';
                return;
            }

            const recent = log.slice(-20).reverse();
            el.innerHTML = recent.map((pick, i) => {
                const num = log.length - i;
                return `<div class="ticker-item ${hasNew && i === 0 ? 'new-pick' : ''}">
                    <span class="pick-num">#${num}</span>
                    ${esc(pick.player)}
                    <span class="pick-pos">${esc(pick.position)}</span>
                    → ${esc(pick.manager)}
                    <span class="pick-price">$${pick.price}</span>
                </div>`;
            }).join('');
        }

        // ---- Spreadsheet Render ----
        function renderSpreadsheet() {
            const el = document.getElementById('spreadsheet');

            // Sort teams alphabetically by manager name for consistent columns
            const teams = [...boardState.teams].sort((a, b) =>
                a.manager.localeCompare(b.manager)
            );
            const numTeams = teams.length;

            // Set grid columns: left label + team columns + right label
            el.style.gridTemplateColumns = `42px repeat(${numTeams}, minmax(140px, 1fr)) 42px`;

            // Build all filled rosters
            const teamRosters = teams.map(t => {
                const keepers = (t.keepers || []).map(k => ({
                    player: k.player, position: k.position, price: k.price, source: 'keeper',
                }));
                const drafted = (t.drafted_players || []).map(d => ({
                    player: d.player, position: d.position, price: d.price, source: 'drafted',
                }));
                return fillRosterSlots([...keepers, ...drafted]);
            });

            let html = '';

            // ---- Header row: corner + team headers + right corner ----
            html += `<div class="ss-corner"></div>`;
            teams.forEach(t => {
                const maxBid = t.budget_remaining - (t.spots_remaining - 1);
                html += `<div class="ss-team-header">
                    <div class="ss-team-name">${esc(t.manager)}</div>
                    <div class="ss-team-budget">$${t.budget_remaining}</div>
                    <div class="ss-team-spots">${t.spots_remaining} spot${t.spots_remaining !== 1 ? 's' : ''} left</div>
                    <div class="ss-team-maxbid">max bid $${maxBid > 0 ? maxBid : 0}</div>
                </div>`;
            });
            html += `<div class="ss-corner-right"></div>`;

            // ---- Section header: HITTING ----
            html += `<div class="ss-pos-label section-hitting">Hit</div>`;
            for (let c = 0; c < numTeams; c++) {
                html += `<div class="ss-section-cell hitting-section"></div>`;
            }
            html += `<div class="ss-pos-label-right section-hitting">Hit</div>`;

            // ---- Hitting rows ----
            const hittingEnd = 13; // indices 0-12 are hitting
            for (let r = 0; r < hittingEnd; r++) {
                const band = r % 2 === 0 ? 'row-even' : 'row-odd';
                html += `<div class="ss-pos-label ${band}">${ROSTER_SLOTS[r].pos}</div>`;
                for (let c = 0; c < numTeams; c++) {
                    const slot = teamRosters[c][r];
                    html += renderCell(slot, band);
                }
                html += `<div class="ss-pos-label-right ${band}">${ROSTER_SLOTS[r].pos}</div>`;
            }

            // ---- Section header: PITCHING ----
            html += `<div class="ss-pos-label section-pitching">Pitch</div>`;
            for (let c = 0; c < numTeams; c++) {
                html += `<div class="ss-section-cell pitching-section"></div>`;
            }
            html += `<div class="ss-pos-label-right section-pitching">Pitch</div>`;

            // ---- Pitching rows ----
            for (let r = hittingEnd; r < ROSTER_SLOTS.length; r++) {
                const band = (r - hittingEnd) % 2 === 0 ? 'row-even' : 'row-odd';
                html += `<div class="ss-pos-label ${band}">${ROSTER_SLOTS[r].pos}</div>`;
                for (let c = 0; c < numTeams; c++) {
                    const slot = teamRosters[c][r];
                    html += renderCell(slot, band);
                }
                html += `<div class="ss-pos-label-right ${band}">${ROSTER_SLOTS[r].pos}</div>`;
            }

            el.innerHTML = html;
        }

        function renderCell(slot, band) {
            if (!slot.player) {
                return `<div class="ss-cell empty-cell ${band}">—</div>`;
            }

            const isNew = lastNewPlayer === slot.player;
            const priceClass = slot.source === 'keeper' ? 'price-keeper' : 'price-drafted';
            const tagClass = slot.source === 'keeper' ? 'tag-keeper' : 'tag-drafted';
            const tagLabel = slot.source === 'keeper' ? 'K' : 'D';

            return `<div class="ss-cell ${band} ${isNew ? 'new-draft-cell' : ''}">
                <span class="player-price ${priceClass}">$${slot.price}</span>
                <span class="source-tag ${tagClass}">${tagLabel}</span>
                <span class="player-name">${esc(slot.player)}</span>
            </div>`;
        }

        // ---- Roster Slot Logic (mirrors dashboard) ----
        function fillRosterSlots(players) {
            const slots = ROSTER_SLOTS.map(def => ({
                pos: def.pos, type: def.type, player: null, price: null, source: null,
            }));

            const unassigned = [...players];

            // Pass 1: exact match
            for (const slot of slots) {
                if (slot.player) continue;
                const idx = unassigned.findIndex(p => p.position === slot.pos);
                if (idx !== -1) {
                    const p = unassigned.splice(idx, 1)[0];
                    Object.assign(slot, { player: p.player, price: p.price, source: p.source });
                }
            }

            // Pass 2: flex
            for (const slot of slots) {
                if (slot.player) continue;
                const eligible = flexMap[slot.pos] || [];
                if (!eligible.length) continue;
                const idx = unassigned.findIndex(p => eligible.includes(p.position));
                if (idx !== -1) {
                    const p = unassigned.splice(idx, 1)[0];
                    Object.assign(slot, { player: p.player, price: p.price, source: p.source });
                }
            }

            // Pass 3: overflow
            for (const p of unassigned) {
                const pType = ['SP', 'RP', 'P'].includes(p.position) ? 'pitching' : 'hitting';
                const empty = slots.find(s => !s.player && s.type === pType);
                if (empty) {
                    Object.assign(empty, { player: p.player, price: p.price, source: p.source });
                }
            }

            return slots;
        }

        // ---- Utility ----
        function esc(str) {
            if (!str) return '';
            const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
            return String(str).replace(/[&<>"']/g, c => m[c]);
        }

        // ---- Init ----
        fetchBoardState();
        setInterval(fetchBoardState, 5000);
    </script>
</body>
</html>
